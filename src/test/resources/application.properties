# Test config — in-memory H2, no MySQL needed.
spring.datasource.url=jdbc:h2:mem:srms_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# dummy JWT props so context loads in integration tests
app.jwt.secret=test-secret-test-secret-test-secret-0123456789
app.jwt.expiration=3600000
