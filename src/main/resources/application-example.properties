# Copy this file to application.properties and fill in real values.
# application.properties is gitignored (contains secrets). This template is safe to commit.

spring.application.name=student-result-management-system
server.port=8080

# ---- MySQL ----
spring.datasource.url=jdbc:mysql://localhost:3306/srms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_MYSQL_USERNAME
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---- JWT ----
# Secret MUST be >= 32 chars (256 bits) for HS256. Generate a random string.
app.jwt.secret=CHANGE_ME_TO_A_LONG_RANDOM_32PLUS_CHAR_SECRET_VALUE
# Expiry in milliseconds (3600000 = 1 hour)
app.jwt.expiration=3600000

# ---- Swagger / OpenAPI ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
