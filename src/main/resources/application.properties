spring.application.name=student-result-management-system
server.port=8080

# ---- MySQL ----  override via env vars (used by Docker / CI / prod)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/srms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---- JWT ----  DEV DEFAULT ONLY. Always override APP_JWT_SECRET in production.
app.jwt.secret=${APP_JWT_SECRET:dev-local-secret-change-me-0123456789-abcdefghij}
app.jwt.expiration=${APP_JWT_EXPIRATION:3600000}

# ---- Swagger / OpenAPI ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
